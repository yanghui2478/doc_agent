<!DOCTYPE html>
<html lang="zh">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<head>
<meta charset="UTF-8">
<title>AI文档智能体</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:900px;
    margin:30px auto;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
    background:#111827;
    color:white;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.upload{
    padding:20px;
    border-bottom:1px solid #eee;
}

.chat{
    height:500px;
    overflow-y:auto;
    padding:20px;
    background:#fafafa;
}

.message{
    margin-bottom:15px;
}

.user{
    text-align:right;
}

.user .bubble{
    background:#2563eb;
    color:white;
}

.ai .bubble{
    background:#e5e7eb;
}

.bubble{
    display:inline-block;
    padding:12px;
    border-radius:10px;
    max-width:70%;
}

.input-area{
    display:flex;
    padding:20px;
    border-top:1px solid #eee;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
AI文档智能体
</div>

<div class="upload">
    <div style="padding:10px 20px;">
    <button onclick="clearChat()">
        清空聊天
    </button>
</div>
<input type="file" id="pdfFile">
<button onclick="uploadPDF()">上传PDF</button>
</div>
<div id="summaryBox"
style="
padding:20px;
background:#f9fafb;
border-bottom:1px solid #eee;
display:none;
">
<h3>📄 文档摘要</h3>

<div id="summaryContent"></div>

</div>
<div class="chat" id="chat"></div>

<div class="input-area">
<input type="text" id="question" placeholder="请输入问题...">
<button onclick="askQuestion()">发送</button>
</div>

</div>

<script>
let pdfUploaded = false;
async function uploadPDF(){

    let fileInput = document.getElementById("pdfFile");

    let file = fileInput.files[0];

    let formData = new FormData();

    formData.append("file", file);

    let response = await fetch("http://127.0.0.1:8000/upload",{
        method:"POST",
        body:formData
    });

    let data = await response.json();

    alert(data.message);
    generateSummary();
    pdfUploaded = true;
}

async function askQuestion(){
    if(!pdfUploaded){

    alert("请先上传PDF文件");

    return;
}

    let questionInput = document.getElementById("question");

    let question = questionInput.value;

    if(!question) return;

    addMessage(question,"user");

    questionInput.value="";

    // 显示等待消息
    let loadingId = addLoadingMessage();

    try{

        let response = await fetch(
            `http://127.0.0.1:8000/ask?question=${encodeURIComponent(question)}`,
            {
                method:"POST"
            }
        );

        let data = await response.json();

        // 删除等待提示
        removeLoadingMessage(loadingId);

        let fullAnswer = `
${data.answer}

---

📚 参考内容：

${data.context}
`;

addMessage(fullAnswer,"ai");

    }catch(error){

        removeLoadingMessage(loadingId);

        addMessage("请求失败，请检查后端服务","ai");
    }
}

function addMessage(text, type, save=true){

    let chat = document.getElementById("chat");

    let messageDiv = document.createElement("div");

    messageDiv.className = `message ${type}`;

    // AI消息支持Markdown
    let content = type === "ai"
        ? marked.parse(text)
        : text;

    messageDiv.innerHTML = `
        <div class="bubble">${content}</div>
    `;

    chat.appendChild(messageDiv);
    if(save){
    saveMessage(text, type);
}

    hljs.highlightAll();

    chat.scrollTop = chat.scrollHeight;
}
async function generateSummary(){

    let summaryBox = document.getElementById("summaryBox");

    let summaryContent = document.getElementById("summaryContent");

    summaryBox.style.display = "block";

    summaryContent.innerHTML = "🤖 AI正在分析文档...";

    let response = await fetch(
        "http://127.0.0.1:8000/summary",
        {
            method:"POST"
        }
    );

    let data = await response.json();

    summaryContent.innerHTML = marked.parse(data.summary);
}
function addLoadingMessage(){

    let chat = document.getElementById("chat");

    let messageDiv = document.createElement("div");

    let id = "loading-" + Date.now();

    messageDiv.id = id;

    messageDiv.className = "message ai";

    messageDiv.innerHTML = `
        <div class="bubble">
            🤖 AI正在思考...
        </div>
    `;

    chat.appendChild(messageDiv);

    chat.scrollTop = chat.scrollHeight;

    return id;
}

function removeLoadingMessage(id){

    let loadingDiv = document.getElementById(id);

    if(loadingDiv){
        loadingDiv.remove();
    }
}
function saveMessage(text, type){

    let messages =
        JSON.parse(localStorage.getItem("messages")) || [];

    messages.push({
        text:text,
        type:type
    });

    localStorage.setItem(
        "messages",
        JSON.stringify(messages)
    );
}
function clearChat(){

    localStorage.removeItem("messages");

    document.getElementById("chat").innerHTML = "";
}
function loadMessages(){

    let messages =
        JSON.parse(localStorage.getItem("messages")) || [];

    messages.forEach(msg => {
        addMessage(msg.text, msg.type, false);
    });
}
document.getElementById("question")
.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        askQuestion();
    }
});
loadMessages();
</script>

</body>
</html>
